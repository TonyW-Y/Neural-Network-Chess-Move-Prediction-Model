<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            background: #2a2a2a;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        h1 {
            color: #fff;
            font-weight: 300;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 12px;
            font-size: 1.5rem;
        }
        #board-wrapper {
            position: relative;
            width: 480px;
            height: 480px;
            margin: 0 auto;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            width: 480px;
            height: 480px;
            border: 2px solid #444;
        }
        .sq {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        .sq.light { background: #e8e8e8; }
        .sq.dark { background: #888; }
        .sq.selected { background: #b7d6f5 !important; }
        .sq.last-move { background: #d4e6b3 !important; }
        .sq.check { background: radial-gradient(ellipse at center, #ff0000 0%, #e00000 25%, transparent 70%) !important; }
        .sq .dot {
            position: absolute;
            width: 16px;
            height: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            pointer-events: none;
        }
        .sq .capture-ring {
            position: absolute;
            width: 54px;
            height: 54px;
            border: 4px solid rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            pointer-events: none;
        }
        .sq .rank-label, .sq .file-label {
            position: absolute;
            font-size: 10px;
            font-weight: bold;
            pointer-events: none;
        }
        .sq.light .rank-label, .sq.light .file-label { color: #999; }
        .sq.dark .rank-label, .sq.dark .file-label { color: #ddd; }
        .sq .rank-label { bottom: 2px; left: 3px; }
        .sq .file-label { top: 2px; right: 3px; }
        .status {
            color: #ccc;
            text-align: center;
            font-size: 1rem;
            margin: 10px 0;
            min-height: 24px;
        }
        .status.bold { font-weight: bold; color: #fff; }
        .controls {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        .controls button, .controls select {
            padding: 6px 14px;
            background: #444;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .controls button:hover { background: #666; }
        .controls select {
            background: #333;
            border: 1px solid #555;
        }
        .move-history {
            background: #1a1a1a;
            padding: 8px 12px;
            border-radius: 4px;
            color: #aaa;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            min-height: 28px;
            max-width: 480px;
            max-height: 80px;
            overflow-y: auto;
            margin-top: 8px;
            line-height: 1.5;
        }
        .move-history .move-num { color: #666; margin-right: 2px; }

        .promotion-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .promotion-overlay.show { display: flex; }
        .promotion-box {
            background: #2a2a2a;
            padding: 24px 32px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #555;
        }
        .promotion-box h2 {
            color: #fff;
            font-weight: 300;
            margin-bottom: 16px;
        }
        .promo-btns { display: flex; gap: 12px; justify-content: center; }
        .promo-btns button {
            font-size: 2rem;
            padding: 10px 18px;
            background: #333;
            color: #fff;
            border: 2px solid #555;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .promo-btns button:hover {
            background: #555;
            transform: scale(1.08);
        }
        .result-banner {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 100;
            text-align: center;
            pointer-events: none;
        }
        @media (max-width: 520px) {
            #board-wrapper, #board { width: 320px; height: 320px; }
            #board { grid-template-columns: repeat(8, 40px); grid-template-rows: repeat(8, 40px); }
            .sq { width: 40px; height: 40px; font-size: 1.6rem; }
            .sq .capture-ring { width: 34px; height: 34px; border-width: 3px; }
            .sq .dot { width: 10px; height: 10px; }
            .sq .rank-label, .sq .file-label { font-size: 8px; }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CHESS</h1>
    <div id="board-wrapper">
        <div id="board"></div>
        <div class="result-banner" id="result-banner"></div>
    </div>
    <div class="status" id="status">Loading...</div>
    <div class="controls">
        <button onclick="newGame()">New</button>
        <select id="side-select">
            <option value="white">Play White</option>
            <option value="black">Play Black</option>
        </select>
        <button onclick="flipBoard()">Flip</button>
        <button onclick="undoMove()">Undo</button>
    </div>
    <div class="move-history" id="move-history"></div>
</div>

<div class="promotion-overlay" id="promotion-overlay">
    <div class="promotion-box">
        <h2>Promote pawn</h2>
        <div class="promo-btns" id="promo-btns"></div>
    </div>
</div>

<script>
const PIECES = {
    'K': '♔', 'Q': '♕', 'R': '♖', 'B': '♗', 'N': '♘', 'P': '♙',
    'k': '♚', 'q': '♛', 'r': '♜', 'b': '♝', 'n': '♞', 'p': '♟'
};
const FILES = 'abcdefgh';

let state = {
    fen: '',
    turn: true,        // true = white's turn, false = black's turn
    playerColor: 'white',
    gameOver: false,
    isCheck: false,
    selectedSq: null,
    lastMoveFrom: null,
    lastMoveTo: null,
    legalMoves: [],    // [{from, to, fromIdx, toIdx, promotion, uci}]
    aiThinking: false,
    flipped: false,
    moves: [],
    pendingPromo: null,
    history: []        // stack of {fen, turn, isCheck, lastMoveFrom, lastMoveTo, moves} before each player move
};

function sqIdx(name) {
    return name.charCodeAt(0) - 97 + (8 - parseInt(name[1])) * 8;
}

function sqName(idx) {
    return FILES[idx % 8] + (8 - Math.floor(idx / 8));
}

async function api(path, body) {
    const opts = { headers: { 'Content-Type': 'application/json' } };
    if (body) { opts.method = 'POST'; opts.body = JSON.stringify(body); }
    const res = await fetch(path, opts);
    return res.json();
}

function parseFEN(fen) {
    const rows = fen.split(' ')[0].split('/');
    const board = [];
    for (let r = 0; r < 8; r++) {
        board[r] = [];
        let c = 0;
        for (const ch of rows[r]) {
            if (ch >= '1' && ch <= '8') {
                for (let i = 0; i < parseInt(ch); i++) board[r][c++] = null;
            } else {
                board[r][c++] = ch;
            }
        }
    }
    return board;
}

function renderBoard() {
    const el = document.getElementById('board');
    el.innerHTML = '';
    const board = parseFEN(state.fen);
    const isWhiteTurn = state.turn === true;
    const kingChar = isWhiteTurn ? 'K' : 'k';
    let kingIdx = null;
    for (let r = 0; r < 8; r++)
        for (let c = 0; c < 8; c++)
            if (board[r][c] === kingChar) kingIdx = r * 8 + c;

    for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
            const dr = state.flipped ? 7 - row : row;
            const dc = state.flipped ? 7 - col : col;
            const sq = dr * 8 + dc;
            const piece = board[dr][dc];

            const div = document.createElement('div');
            const light = (dr + dc) % 2 === 0;
            div.className = `sq ${light ? 'light' : 'dark'}`;
            div.dataset.sq = sq;

            if (piece) div.textContent = PIECES[piece];

            if (state.lastMoveFrom !== null && (sq === state.lastMoveFrom || sq === state.lastMoveTo))
                div.classList.add('last-move');
            if (state.isCheck && kingIdx !== null && sq === kingIdx)
                div.classList.add('check');
            if (state.selectedSq === sq)
                div.classList.add('selected');

            if (state.selectedSq !== null) {
                for (const m of state.legalMoves) {
                    if (m.fromIdx === state.selectedSq && m.toIdx === sq) {
                        if (board[dr][dc]) {
                            const ring = document.createElement('div');
                            ring.className = 'capture-ring';
                            div.appendChild(ring);
                        } else {
                            const dot = document.createElement('div');
                            dot.className = 'dot';
                            div.appendChild(dot);
                        }
                    }
                }
            }

            if (col === 0) {
                const lbl = document.createElement('span');
                lbl.className = 'rank-label';
                lbl.textContent = dr + 1;
                div.appendChild(lbl);
            }
            if (row === 7) {
                const lbl = document.createElement('span');
                lbl.className = 'file-label';
                lbl.textContent = FILES[dc];
                div.appendChild(lbl);
            }

            div.addEventListener('click', () => clickSq(sq));
            el.appendChild(div);
        }
    }
}

function isOwnPiece(piece) {
    if (!piece) return false;
    const white = piece === piece.toUpperCase();
    return (state.playerColor === 'white' && white) || (state.playerColor === 'black' && !white);
}

async function clickSq(sq) {
    if (state.gameOver || state.aiThinking) return;
    const isPlayerTurn = (state.playerColor === 'white' && state.turn === true) ||
                         (state.playerColor === 'black' && state.turn === false);
    if (!isPlayerTurn) return;

    const dr = Math.floor(sq / 8), dc = sq % 8;
    const board = parseFEN(state.fen);
    const piece = board[dr][dc];

    if (state.selectedSq !== null) {
        const match = state.legalMoves.find(m => m.fromIdx === state.selectedSq && m.toIdx === sq);
        if (match) {
            if (match.promotion) {
                state.pendingPromo = match;
                showPromotion();
                return;
            }
            await sendMove(match.uci);
            return;
        }
        if (piece && isOwnPiece(piece)) {
            state.selectedSq = sq;
            await fetchMoves(sq);
            renderBoard();
            return;
        }
        state.selectedSq = null;
        renderBoard();
        return;
    }

    if (piece && isOwnPiece(piece)) {
        state.selectedSq = sq;
        await fetchMoves(sq);
        renderBoard();
    }
}

async function fetchMoves(sq) {
    const name = sqName(sq);
    const data = await api('/moves', { fen: state.fen, square: name });
    state.legalMoves = data.moves.map(m => ({
        ...m,
        fromIdx: sqIdx(m.from),
        toIdx: sqIdx(m.to)
    }));
}

async function sendMove(uci) {
    state.history.push({
        fen: state.fen,
        turn: state.turn,
        isCheck: state.isCheck,
        lastMoveFrom: state.lastMoveFrom,
        lastMoveTo: state.lastMoveTo,
        moves: [...state.moves]
    });
    state.aiThinking = true;
    state.selectedSq = null;
    state.legalMoves = [];
    updateStatus();
    try {
        const data = await api('/move', { fen: state.fen, move: uci, color: state.playerColor });
        if (data.error) { alert(data.error); state.aiThinking = false; state.history.pop(); return; }
        applyServerState(data);
    } catch (e) { alert('Connection error'); }
    state.aiThinking = false;
}

async function doAIMove() {
    state.aiThinking = true;
    updateStatus();
    try {
        const data = await api('/ai_move', { fen: state.fen, color: state.playerColor });
        if (data.error) { state.aiThinking = false; return; }
        state.aiThinking = false;
        applyServerState(data, true);
    } catch (e) { state.aiThinking = false; alert('Connection error'); }
}

function isAITurn() {
    if (state.gameOver) return false;
    return (state.playerColor === 'white' && state.turn === false) ||
           (state.playerColor === 'black' && state.turn === true);
}

function applyServerState(data, aiTriggered) {
    state.fen = data.fen;
    state.turn = data.turn;
    state.gameOver = data.is_game_over;
    state.isCheck = data.is_check;
    state.legalMoves = [];

    if (data.last_move) {
        state.lastMoveFrom = sqIdx(data.last_move.slice(0, 2));
        state.lastMoveTo = sqIdx(data.last_move.slice(2, 4));
    }

    if (data.last_move_san) state.moves.push(data.last_move_san);
    if (data.ai_move_san) state.moves.push(data.ai_move_san);

    renderBoard();
    if (data.is_game_over) {
        updateStatus(data);
    } else if (data.ai_move_san && !aiTriggered) {
        updateStatus(data);
    } else {
        updateStatus();
    }
    updateHistory();

    if (data.is_game_over) {
        const banner = document.getElementById('result-banner');
        const reason = data.game_over_reason || 'Game Over';
        let label = 'Draw';
        if (data.is_checkmate) label = data.ai_move ? 'AI wins' : 'You win';
        banner.textContent = `${label} — ${reason}`;
        banner.style.display = 'block';
    } else {
        document.getElementById('result-banner').style.display = 'none';
        if (isAITurn()) {
            setTimeout(() => doAIMove(), 100);
        }
    }
}

async function newGame() {
    state.selectedSq = null;
    state.legalMoves = [];
    state.moves = [];
    state.lastMoveFrom = null;
    state.lastMoveTo = null;
    state.pendingPromo = null;
    state.aiThinking = false;
    state.history = [];
    document.getElementById('result-banner').style.display = 'none';
    document.getElementById('promotion-overlay').classList.remove('show');
    try {
        const data = await api('/new_game');
        state.fen = data.fen;
        state.turn = data.turn;
        state.gameOver = false;
        state.isCheck = false;
        renderBoard();
        updateStatus();
        updateHistory();
        if (isAITurn()) {
            setTimeout(() => doAIMove(), 200);
        }
    } catch (e) { console.error(e); }
}

function flipBoard() {
    state.flipped = !state.flipped;
    renderBoard();
}

async function undoMove() {
    if (state.history.length === 0) { newGame(); return; }
    const prev = state.history.pop();
    state.fen = prev.fen;
    state.turn = prev.turn;
    state.isCheck = prev.isCheck;
    state.lastMoveFrom = prev.lastMoveFrom;
    state.lastMoveTo = prev.lastMoveTo;
    state.moves = prev.moves;
    state.gameOver = false;
    state.selectedSq = null;
    state.legalMoves = [];
    state.pendingPromo = null;
    document.getElementById('result-banner').style.display = 'none';
    document.getElementById('promotion-overlay').classList.remove('show');
    renderBoard();
    updateStatus();
    updateHistory();
}

function showPromotion() {
    const overlay = document.getElementById('promotion-overlay');
    const btns = document.getElementById('promo-btns');
    const isWhite = state.playerColor === 'white';
    const pieces = [
        { type: 'q', char: isWhite ? '♕' : '♛' },
        { type: 'r', char: isWhite ? '♖' : '♜' },
        { type: 'b', char: isWhite ? '♗' : '♝' },
        { type: 'n', char: isWhite ? '♘' : '♞' }
    ];
    btns.innerHTML = pieces.map(p =>
        `<button onclick="promote('${p.type}')">${p.char}</button>`
    ).join('');
    overlay.classList.add('show');
}

async function promote(piece) {
    document.getElementById('promotion-overlay').classList.remove('show');
    if (!state.pendingPromo) return;
    const uci = state.pendingPromo.from + state.pendingPromo.to + piece;
    state.pendingPromo = null;
    await sendMove(uci);
}

function updateStatus(data) {
    const el = document.getElementById('status');
    if (data && data.is_game_over) {
        if (data.is_checkmate) el.textContent = data.ai_move ? 'AI wins by checkmate!' : 'You win by checkmate!';
        else el.textContent = data.game_over_reason || 'Game Over';
        el.className = 'status bold';
        return;
    }
    if (state.gameOver) { el.textContent = 'Game over'; el.className = 'status bold'; return; }
    if (state.aiThinking) { el.textContent = 'AI thinking...'; el.className = 'status'; return; }

    const isPlayerTurn = (state.playerColor === 'white' && state.turn === true) ||
                         (state.playerColor === 'black' && state.turn === false);
    let msg = isPlayerTurn ? 'Your turn' : 'AI thinking...';
    if (state.isCheck) msg += ' — Check!';
    el.textContent = msg;
    el.className = 'status';
}

function updateHistory() {
    const el = document.getElementById('move-history');
    if (!state.moves.length) { el.textContent = 'No moves'; return; }
    let html = '';
    for (let i = 0; i < state.moves.length; i += 2) {
        const num = Math.floor(i / 2) + 1;
        html += `<span class="move-num">${num}.</span>${state.moves[i]} `;
        if (state.moves[i + 1]) html += `${state.moves[i + 1]} `;
    }
    el.innerHTML = html;
    el.scrollTop = el.scrollHeight;
}

document.getElementById('side-select').addEventListener('change', function(e) {
    state.playerColor = e.target.value;
    newGame();
});

document.addEventListener('keydown', e => {
    if (e.key === 'r' || e.key === 'R') newGame();
    if (e.key === 'f' || e.key === 'F') flipBoard();
    if (e.key === 'z' || e.key === 'Z') undoMove();
    if (e.key === 'Escape') {
        state.selectedSq = null;
        state.legalMoves = [];
        renderBoard();
    }
});

newGame();
</script>
</body>
</html>
